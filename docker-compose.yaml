services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: credit_score_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    restart: always
    ports:
      - "8000:8080"
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/credit_score_db
      PORT: 8080
    depends_on:
      - db

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "8501:8080"
    environment:
      BACKEND_URL: http://backend:8080
      PORT: 8080
    depends_on:
      - backend

volumes:
  db-data:
